services:
  frontend:
    profiles: [frontend, all]
    build:
      context: ../../../frontend
      dockerfile: Dockerfile.dev
    container_name: mycpt-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../../../frontend:/app
      - /app/node_modules # 컨테이너 내부 node_modules는 마운트에서 제외
      - /app/.next # Next.js 빌드 캐시도 마운트에서 제외
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped

  mysql:
    profiles: [infra, all]
    image: mysql:8.4
    container_name: mycpt-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: mycpt
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      LANG: C.UTF-8
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: [infra, all]
    image: redis:7.4-alpine
    container_name: mycpt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
