<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>MyCPT — 와이어프레임 P2: 동료 & 케미</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        oklch(0.22 0.012 250);
    --ink-soft:   oklch(0.42 0.010 250);
    --ink-faint:  oklch(0.62 0.008 250);
    --paper:      oklch(0.985 0.005 85);
    --paper-2:    oklch(0.965 0.008 80);
    --paper-3:    oklch(0.94 0.010 80);
    --line:       oklch(0.78 0.010 250);
    --line-soft:  oklch(0.88 0.008 250);
    --accent:     oklch(0.62 0.13 40);
    --accent-2:   oklch(0.92 0.04 40);
    --highlight:  oklch(0.92 0.10 95);
    --member:     oklch(0.50 0.11 150);
    --member-bg:  oklch(0.94 0.04 150);
    --disc-d:     oklch(0.60 0.17 30);
    --disc-i:     oklch(0.70 0.14 80);
    --disc-s:     oklch(0.55 0.13 150);
    --disc-c:     oklch(0.55 0.13 240);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; overflow: hidden; }

  /* frame */
  .wf { width: 360px; height: 720px; background: white; border: 1.5px solid var(--ink); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .wf-status { height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 4px 16px; font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--ink-soft); background: var(--paper-2); border-bottom: 1px dashed var(--line); }
  .wf-header { height: 48px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; border-bottom: 1px solid var(--line); background: white; }
  .wf-header .logo { font-family: 'Caveat', cursive; font-size: 22px; font-weight: 700; color: var(--ink); }
  .wf-header .right { display: flex; align-items: center; gap: 8px; }
  .wf-bell { position: relative; width: 26px; height: 26px; border: 1.2px solid var(--ink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .wf-bell .dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; border: 1.5px solid white; }
  .wf-chip { border: 1.2px solid var(--ink); border-radius: 999px; background: white; display: flex; align-items: center; gap: 6px; padding: 3px 4px 3px 10px; font-size: 11px; font-weight: 600; }
  .wf-chip .avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--paper-3); border: 1px solid var(--ink); display: flex; align-items: center; justify-content: center; font-size: 8.5px; color: var(--ink-soft); }
  .wf-body { flex: 1; overflow-y: auto; background: var(--paper-2); position: relative; }
  .wf-tabs { height: 60px; flex-shrink: 0; border-top: 1px solid var(--ink); display: grid; grid-template-columns: repeat(4, 1fr); background: var(--paper-2); }
  .wf-tabs .tab { text-align: center; padding: 8px 4px; font-size: 10.5px; color: var(--ink-soft); border-right: 1px dashed var(--line); line-height: 1.2; font-weight: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; white-space: nowrap; }
  .wf-tabs .tab:last-child { border-right: none; }
  .wf-tabs .tab.active { color: var(--accent); font-weight: 700; background: white; }
  .wf-tabs .tab .icon { font-size: 14px; line-height: 1; }

  /* type pills (DISC) */
  .type-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .type-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .type-d { background: oklch(0.96 0.05 30); color: var(--disc-d); }
  .type-d .dot { background: var(--disc-d); }
  .type-i { background: oklch(0.97 0.05 80); color: oklch(0.45 0.14 80); }
  .type-i .dot { background: var(--disc-i); }
  .type-s { background: oklch(0.96 0.04 150); color: var(--disc-s); }
  .type-s .dot { background: var(--disc-s); }
  .type-c { background: oklch(0.96 0.04 240); color: var(--disc-c); }
  .type-c .dot { background: var(--disc-c); }

  /* back bar (reused from result detail) */
  .back-bar { background: white; border-bottom: 1px solid var(--line); padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .back-bar .back { width: 28px; height: 28px; border: 1.2px solid var(--ink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .back-bar .meta { display: flex; flex-direction: column; gap: 1px; min-width: 0; flex: 1; }
  .back-bar .title { font-size: 13.5px; font-weight: 700; line-height: 1.2; }
  .back-bar .sub { font-size: 10.5px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; }
  .back-bar .icon-btn { width: 28px; height: 28px; border: 1.2px solid var(--ink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; }

  /* section heads */
  .section-label { padding: 14px 16px 6px; font-size: 10.5px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; letterSpacing: 0.06em; text-transform: uppercase; letter-spacing: 0.05em; }

  /* page tabs (sub-tabs inside body) */
  .page-tabs { background: white; border-bottom: 1px solid var(--line); display: grid; grid-template-columns: 1fr 1fr; }
  .page-tabs .pt { text-align: center; padding: 14px 4px 12px; font-size: 13px; font-weight: 600; color: var(--ink-faint); border-bottom: 2px solid transparent; white-space: nowrap; }
  .page-tabs .pt.active { color: var(--ink); border-bottom-color: var(--accent); }

  /* dialog */
  .scrim { position: absolute; inset: 0; background: oklch(0.2 0.01 250 / 0.45); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .dialog-card { background: white; border: 1.5px solid var(--ink); border-radius: 16px; padding: 22px 22px 18px; width: 280px; box-shadow: 0 10px 40px oklch(0.2 0.01 250 / 0.25); }
  .dialog-card .icon { font-size: 28px; text-align: center; margin-bottom: 8px; }
  .dialog-card h3 { font-family: 'Inter'; font-size: 16px; font-weight: 800; margin: 0 0 6px; text-align: center; }
  .dialog-card p { font-size: 12px; color: var(--ink-soft); line-height: 1.55; margin: 0 0 16px; text-align: center; }

  /* coin pill (reused) */
  .coin-pill { display: inline-flex; align-items: center; border: 1.2px solid var(--ink); border-radius: 999px; background: white; font-size: 10.5px; font-weight: 600; overflow: hidden; line-height: 1; }
  .coin-pill .left { padding: 4px 8px; font-family: 'JetBrains Mono', monospace; color: var(--ink-soft); border-right: 1px solid var(--line); background: var(--paper-2); }
  .coin-pill .right { padding: 4px 8px; display: flex; align-items: center; gap: 3px; }
  .coin-pill .icon { color: var(--accent); }

  /* avatar */
  .avatar-circle { border: 1.2px solid var(--ink); border-radius: 50%; background: var(--paper-3); display: flex; align-items: center; justify-content: center; color: var(--ink-soft); font-weight: 700; font-family: 'Inter'; flex-shrink: 0; }

  /* sheet (reused style from P1 share/test sheets) */
  .sheet-handle { width: 40px; height: 4px; background: var(--line); border-radius: 2px; margin: 8px auto 4px; }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px 12px; border-bottom: 1px solid var(--line); }
  .sheet-head .close { width: 28px; height: 28px; border: 1.2px solid var(--ink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .sheet-head .title { font-family: 'Inter'; font-size: 13.5px; font-weight: 700; }

  /* buttons */
  .btn-primary { background: var(--ink); color: var(--paper); text-align: center; padding: 12px 0; border-radius: 10px; font-size: 13px; font-weight: 600; }
  .btn-secondary { border: 1.5px solid var(--ink); text-align: center; padding: 11px 0; border-radius: 10px; font-size: 13px; font-weight: 600; background: white; }
  .btn-kakao { background: #FEE500; color: #191919; text-align: center; padding: 12px 0; border-radius: 10px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }

  /* annotation */
  .variant-note { background: var(--paper-2); border: 1.5px dashed var(--line); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--ink-soft); line-height: 1.55; margin-top: 12px; font-family: 'Inter'; }
  .variant-note b { color: var(--ink); }
  .variant-note .label { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.05em; text-transform: uppercase; background: var(--ink); color: var(--paper); padding: 2px 6px; border-radius: 3px; margin-right: 6px; }
  .variant-cap { font-family: 'Caveat', cursive; font-size: 22px; font-weight: 700; color: var(--ink); margin: 0 0 8px; text-align: center; }
  .variant-cap .name { color: var(--accent); }
  .variant-cap .id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-faint); margin-right: 8px; background: var(--paper-2); padding: 2px 8px; border-radius: 999px; border: 1px dashed var(--line); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-p2-peers.jsx"></script>
</body>
</html>
