  wireframe: 와이어프레임 P4 - 내 정보.html#profile
  components: [BackBar, ProfileImageUpload, TextInput, YearSelect, GenderSegment]
  api:
    - { method: GET, path: /auth/me }
    - { method: PATCH, path: /users/me }
    - { method: POST, path: /users/me/profile-image }
  validation:
    nickname: { min: 1, max: 20, required: true }
    birth_year: { min: 1940, max: 2026, required: true }
    gender: { values: [M, F, NONE], required: true }
    profile_image: { max_mb: 10, formats: [jpg, png, webp] }

