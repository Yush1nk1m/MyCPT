  states:
    loading: 스켈레톤 카드 3개
    empty_self: "아직 검사 기록이 없어요 — 검사 시작 CTA"
    empty_other: "아직 친구에게 평정 요청한 적이 없어요 — 공유 CTA"
    has_data: 카드 리스트 + 커서 페이지네이션
  notes: |
    P2 확정안 = A 카드 리스트. 검사 종류 필터는 DISC만 (MVP).

- id: result-detail
  label: 결과 상세
  route: /results/[id]
  auth: member
  tab: results
  parent: results-list
  wireframe: 와이어프레임 P2 - 결과 상세.html#self
  components: [BackBar, RaterPill, TypePill, DiscBarsLarge, MarkdownReport]
  api:
    - { method: GET, path: /results/{id} }
  states:
    loading: 스켈레톤 + 헤더
    has_data: hero(DISC 4축) + 마크다운 본문
    not_found: 결과 없음
  notes: |
    rater=OTHER일 때 hero에 평정자 라벨 칩, 본문 인칭이 3인칭으로.

