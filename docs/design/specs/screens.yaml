# MyCPT — 화면 명세 (Screen Spec)
# 머신 리더블: 각 화면의 id / 경로 / 인증 / 컴포넌트 / API / 상태 / 와이어프레임 위치를 매핑.
# 코드 생성 시 첫 번째로 조회하는 SSOT (Single Source of Truth).
#
# 필드 정의:
#   id            — kebab-case 고유 ID. 컴포넌트 이름의 PascalCase 변환 기준 (예: peers-list → PeersList)
#   label         — 한국어 화면 명칭
#   route         — Next.js 라우트 (overlay/dialog는 별도 표기)
#   auth          — public | member | guest-or-member (외부 평정자처럼 인증 무관)
#   tab           — 4개 하단 탭 중 어디 속하는지 (home/results/peers/account/none)
#   parent        — 모달·다이얼로그가 어느 화면 위에 띄워지는지
#   wireframe     — 파일#artboard-id 형태로 와이어프레임 위치
#   components    — 사용하는 재사용 컴포넌트 목록 (specs/components.yaml과 매핑)
#   api           — 호출/구독 API 엔드포인트
#   states        — 화면 내 상태 분기 (loading/empty/error/특수상태)
#   notes         — 구현 시 주의사항

version: 0.1
generated_from: 와이어프레임 P1~P6 + IA v0.3 + docs/api-design.md
last_updated: 2026-05-27

