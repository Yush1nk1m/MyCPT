- id: main
  label: 메인
  route: /
  auth: public
  tab: home
  wireframe: 와이어프레임 P1.html#main-a
  components: [WfFrame, PillCTA, LockedToast, HeaderMember, HeaderGuest, TabBar]
  api:
    - { method: GET, path: /auth/me, optional: true, note: "로그인 상태 판별" }
    - { method: GET, path: /results, params: { limit: 1 }, when: member, note: "최근 결과 요약" }
  states:
    member: 4개 CTA 모두 활성화
    guest: ②③ CTA에 자물쇠 배지 + opacity 0.55. 탭 시 LockedToast 노출
  cta_targets:
