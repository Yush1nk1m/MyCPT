    - { label: "보고서 목록", default: true }
  states:
    loading: 스켈레톤
    empty: "아직 발행한 보고서가 없어요"
    has_data: 카드 리스트. generating 상태 카드가 inline으로 표시되며 SSE 도착 시 같은 자리에서 본 카드로 교체
  notes: |
    별도 "발행 중" 탭 없음. inline 표시 + SSE 갱신.

- id: peer-detail
  label: 동료 프로필
  route: /colleagues/[id]
  auth: member
  tab: peers
  parent: peers-list
  wireframe: 와이어프레임 P2 - 동료 & 케미.html#detail
  components: [BackBar, Avatar, TypePill, ChemistryCTA, PastReportRow]
  api:
    - { method: GET, path: /colleagues/{id} }
    - { method: GET, path: /coins, note: "발행 CTA에 잔량 표시" }
  states:
    loading: 스켈레톤
    has_data: 프로필 hero + 케미 발행 카드 + 이전 보고서 리스트
    deleted_peer: "이 동료가 탈퇴했어요" — 이전 보고서만 노출, 발행 비활성
  cta:
    - { label: "케미 발행 (코인 1)", action: open_modal, target: chemistry-confirm-modal, disabled_when: "coins == 0" }

- id: peer-register-modal
  label: 동료 등록 모달
  route: bottom-sheet on peers-list
  auth: member
  tab: peers
  parent: peers-list
  wireframe: 와이어프레임 P2 - 동료 & 케미.html#register
  components: [BottomSheet, CodeInput, KakaoShareButton]
  api:
    - { method: POST, path: /colleagues, body: { code } }
  states:
    default: 코드 입력 영역 + "또는" + 내 코드 공유 영역
    invalid_code: "올바르지 않은 코드예요"
    self_code: "본인의 코드는 등록할 수 없어요"
  validation:
    code: { pattern: "^MYCPT-[A-Z0-9]{4}-[A-Z0-9]{3}$" }

- id: chemistry-confirm-modal
  label: 케미 발행 확인 모달 (M4)
  route: dialog on peer-detail
  auth: member
  tab: peers
  parent: peer-detail
  wireframe: 와이어프레임 P2 - 동료 & 케미.html#chem-confirm
  components: [DialogCard, Scrim, CoinBreakdown]
  api:
    - { method: POST, path: /chemistry-reports, body: { colleague_id }, response: 202 }
  states:
    default: 사용/잔량/충전까지 3행 표
    insufficient_coins: 잔량 부족 → 발행 버튼 비활성 + 충전 시간 안내
  notes: |
    확인 → chemistry-list에 "발행 중…" 카드로 즉시 표시. SSE 완료 이벤트 도착 시 교체.

- id: chemistry-detail
  label: 케미 보고서 상세
  route: /chemistry/[id]
  auth: member
  tab: peers
  parent: chemistry-list
  wireframe: 와이어프레임 P3 - 케미 보고서.html#detail-ready
  components: [BackBar, Avatar, TypePill, MarkdownReport, GeneratingPlaceholder]
  api:
    - { method: GET, path: /chemistry-reports/{id} }
    - { method: SSE, path: /notifications/stream, event: "chemistry.ready" }
  states:
    generating: hero(두 아바타) + 스피너·스켈레톤 본문. SSE 도착 시 자동 전환
    ready: hero + 마크다운 본문 (6 섹션)
    error: "발행에 실패했어요. 코인이 환불되었어요." + 재시도
    not_found: 보고서 없음
  notes: |
    generating 상태에서도 두 아바타는 즉시 표시 (즉시 알 수 있는 정보).

- id: invite-accept
  label: 동료 초대 수락
  route: /invite/[code]
  auth: guest-or-member
  tab: none
  wireframe: 와이어프레임 P3 - 케미 보고서.html#invite
  components: [Avatar, TypePill, BenefitItem, KakaoLoginButton]
  api:
    - { method: GET, path: /colleagues/invite/{code} }
    - { method: POST, path: /colleagues, body: { code }, after_login: true }
  states:
    valid_guest: 초대자 정보 + 카카오 로그인 + 자동 등록 CTA
    valid_member: 초대자 정보 + "동료로 등록" CTA
    expired: "초대장이 만료됐어요" (24시간 유효)
    self_invite: "본인의 초대장이에요"
    already_peer: "이미 동료로 등록된 사람이에요"

