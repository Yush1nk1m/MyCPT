    has_data: 카드 그리드
  notes: |
    "동료 & 케미" 메뉴는 두 탭(동료/보고서)이 같은 페이지를 공유.

- id: chemistry-list
  label: 케미 보고서 목록
  route: /chemistry  (또는 /colleagues?tab=reports)
  auth: member
  tab: peers
  wireframe: 와이어프레임 P3 - 케미 보고서.html#list
  components: [WfFrame, PageTabs, ChemistryReportCard, GeneratingCard, Avatar]
  api:
