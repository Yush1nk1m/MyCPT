spring.application.name=backend

# Claude API
llm.anthropic.api-key=${ANTHROPIC_API_KEY}
llm.anthropic.model=claude-sonnet-4-6
llm.anthropic.max-tokens=4000

# disc_cache TTL (온디맨드 만료 기준)
cache.disc.ttl-days=365

# chemistry_cache 구독자 TIMEOUT
chemistry.subscriber-wait-timeout-seconds=300

# Spring MVC async-supported 설정
spring.mvc.async.request-timeout=-1

# Logging Level 설정
logging.level.com.mycpt.backend.domain.notification=DEBUG